apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-store-ui
  namespace: argocd
  labels:
    app.kubernetes.io/name: retail-store-ui
    app.kubernetes.io/part-of: retail-store
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: dev
  source:
    repoURL: https://github.com/your-org/retail-store-apps
    targetRevision: HEAD
    path: charts/ui
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m