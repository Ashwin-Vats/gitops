apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-store-platform
  namespace: argocd
  labels:
    app.kubernetes.io/name: retail-store-platform
    app.kubernetes.io/part-of: retail-store
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/your-org/retail-store-apps  # Replace with your actual apps repo
    targetRevision: HEAD
    path: charts/platform
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml  # Will be overridden by environment
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m