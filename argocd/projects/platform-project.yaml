apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  labels:
    app.kubernetes.io/name: platform
    app.kubernetes.io/part-of: retail-store
spec:
  description: Platform components project
  sourceRepos:
    - 'https://github.com/your-org/retail-store-apps'
  destinations:
    - namespace: platform
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: false
  roles:
    - name: platform-admin
      description: Platform administrator role
      policies:
        - p, proj:platform:platform-admin, applications, *, platform/*, allow
      groups:
        - retail-store-platform-admin