apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-store-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: retail-store-root
    app.kubernetes.io/part-of: retail-store
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/retail-store-gitops
    targetRevision: HEAD
    path: environments
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m